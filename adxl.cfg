# ============================================================
# Serial de tu ADXL (configura segun tu impresora)
# Para obtenerlo: ls /dev/serial/by-id/usb-Klipper_rp2040_*
# ============================================================
[mcu adxl]
serial: CHANGE_ME

[adxl345]
cs_pin: adxl:gpio9
spi_software_sclk_pin: adxl:gpio10
spi_software_mosi_pin: adxl:gpio11
spi_software_miso_pin: adxl:gpio12

[resonance_tester]
accel_chip: adxl345
#accel_per_hz: 70
probe_points: 110, 110, 20


[gcode_macro INPUTSHAPER_X]
description: "Mide resonancia X, genera gráfica y guarda valores"
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  RESPOND MSG="Iniciando test de resonancia eje X..."
  SHAPER_CALIBRATE AXIS=x
  SAVE_CONFIG

[gcode_macro INPUTSHAPER_Y]
description: "Mide resonancia Y, genera gráfica y guarda valores"
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  RESPOND MSG="Iniciando test de resonancia eje Y..."
  SHAPER_CALIBRATE AXIS=y
  SAVE_CONFIG
